<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="'SF Mono','Fira Code','Consolas',monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5b8def" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="540" rx="8" fill="#1a1b2e"/>

  <!-- === LEFT: LLM Session 1 === -->
  <rect x="32" y="140" width="170" height="70" rx="6" fill="#252638" stroke="#3d3e52" stroke-width="0.8"/>
  <text x="117" y="170" text-anchor="middle" fill="#e8e8ec" font-size="13" font-weight="500" font-family="'Inter','Helvetica Neue',sans-serif">LLM Session 1</text>
  <text x="117" y="188" text-anchor="middle" fill="#7a7a8a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">Claude, GPT, local...</text>

  <!-- Arrow: Session 1 → COGNIDOC.md -->
  <path d="M202 160 L280 160 L280 118 L330 118" fill="none" stroke="#5b8def" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="245" y="108" text-anchor="middle" fill="#5b8def" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif">session start:</text>
  <text x="245" y="120" text-anchor="middle" fill="#5b8def" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif">read bootloader</text>

  <!-- Arrow: Session 1 → filtered docs (dashed) -->
  <path d="M202 185 L265 185 L265 275 L330 275" fill="none" stroke="#5b8def" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="230" y="240" fill="#5b8def" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif" transform="rotate(-90 230 240)">navigate by SBS beacons</text>

