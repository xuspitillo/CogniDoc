  <text x="460" y="330" text-anchor="middle" fill="#7a7a8a" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif">5 protocols: SBS · PSS · CPA · CLASSIFICATION · PHS</text>

  <!-- Continuity indicator -->
