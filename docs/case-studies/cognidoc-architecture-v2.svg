  <text x="460" y="366" text-anchor="middle" fill="#7a7a8a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">State persists across</text>
  <text x="460" y="380" text-anchor="middle" fill="#7a7a8a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">sessions and models</text>

  <!-- === RIGHT: LLM Session 2 === -->
  <rect x="620" y="140" width="170" height="70" rx="6" fill="#252638" stroke="#3d3e52" stroke-width="0.8"/>
