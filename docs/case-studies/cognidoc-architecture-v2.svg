  <text x="705" y="184" text-anchor="middle" fill="#7a7a8a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">Later, different model</text>

  <!-- Arrow: Session 2 → COGNIDOC.md (routed above the project box) -->
  <path d="M620 155 L600 155 L600 45 L460 45 L460 58" fill="none" stroke="#5b8def" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="530" y="38" text-anchor="middle" fill="#5b8def" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif">same protocol, full context recovered</text>

  <!-- Bottom credit -->
  <text x="410" y="490" text-anchor="middle" fill="#4a4a5a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">Apache 2.0 · BYO-LLM · github.com/xuspitillo/CogniDoc</text>
