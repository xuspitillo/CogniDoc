  <rect x="330" y="60" width="260" height="390" rx="8" fill="none" stroke="#5b8def" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="460" y="88" text-anchor="middle" fill="#e8e8ec" font-size="14" font-weight="600" font-family="'Inter','Helvetica Neue',sans-serif">Project root</text>

