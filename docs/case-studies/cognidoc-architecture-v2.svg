  <rect x="352" y="228" width="216" height="30" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.5"/>
  <text x="364" y="247" fill="#c8c8d0" font-size="11">HANDSHAKES.md</text>

  <!-- Folder: missions/ -->
  <rect x="352" y="270" width="104" height="30" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.5"/>
  <text x="364" y="289" fill="#9d9da8" font-size="11">missions/</text>

  <!-- Folder: handshakes/ -->
  <rect x="464" y="270" width="104" height="30" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.5"/>
