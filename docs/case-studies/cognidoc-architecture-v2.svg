  <text x="556" y="126" text-anchor="end" fill="#7a7a8a" font-size="9" font-family="'Inter','Helvetica Neue',sans-serif">bootloader</text>

  <!-- File: MEMORY.md -->
  <rect x="352" y="152" width="216" height="30" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.5"/>
  <text x="364" y="171" fill="#c8c8d0" font-size="11">MEMORY.md</text>

  <!-- File: SIGNAL_REGISTRY.md -->
  <rect x="352" y="190" width="216" height="30" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.5"/>
  <text x="364" y="209" fill="#c8c8d0" font-size="11">SIGNAL_REGISTRY.md</text>

