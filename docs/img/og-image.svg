<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'SF Mono','Fira Code','Consolas',monospace">

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1b2e"/>

  <!-- CogniDoc name -->
  <text x="80" y="200" fill="#e8e8ec" font-size="64" font-weight="700">CogniDoc</text>

  <!-- Tagline -->
  <text x="80" y="260" fill="#9d9da8" font-size="18" font-family="'Inter','Helvetica Neue',sans-serif">A markdown convention pack for keeping LLM project</text>
  <text x="80" y="286" fill="#9d9da8" font-size="18" font-family="'Inter','Helvetica Neue',sans-serif">context coherent across sessions.</text>

  <!-- Mini flow: Session → COGNIDOC.md → Session -->
  <rect x="80" y="370" width="120" height="44" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.8"/>
  <text x="140" y="396" text-anchor="middle" fill="#7a7a8a" font-size="11" font-family="'Inter','Helvetica Neue',sans-serif">Session 1</text>

  <line x1="200" y1="392" x2="280" y2="392" stroke="#5b8def" stroke-width="1"/>
  <polygon points="278,388 286,392 278,396" fill="#5b8def"/>

  <rect x="286" y="362" width="180" height="60" rx="4" fill="#2a2d4a" stroke="#5b8def" stroke-width="0.8"/>
  <text x="376" y="388" text-anchor="middle" fill="#5b8def" font-size="12" font-weight="500">COGNIDOC.md</text>
  <text x="376" y="406" text-anchor="middle" fill="#7a7a8a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">bootloader</text>

  <line x1="466" y1="392" x2="546" y2="392" stroke="#5b8def" stroke-width="1"/>
  <polygon points="544,388 552,392 544,396" fill="#5b8def"/>

  <rect x="552" y="370" width="120" height="44" rx="4" fill="#252638" stroke="#3d3e52" stroke-width="0.8"/>
  <text x="612" y="396" text-anchor="middle" fill="#7a7a8a" font-size="11" font-family="'Inter','Helvetica Neue',sans-serif">Session 2</text>

  <!-- Continuity label -->
  <text x="376" y="450" text-anchor="middle" fill="#4a4a5a" font-size="10" font-family="'Inter','Helvetica Neue',sans-serif">context persists · any LLM · any session</text>

  <!-- Bottom right: repo + license -->
  <text x="1120" y="570" text-anchor="end" fill="#4a4a5a" font-size="13" font-family="'Inter','Helvetica Neue',sans-serif">github.com/xuspitillo/CogniDoc</text>
  <text x="1120" y="590" text-anchor="end" fill="#3d3e52" font-size="11" font-family="'Inter','Helvetica Neue',sans-serif">Apache 2.0 · v0.3.0</text>
</svg>
