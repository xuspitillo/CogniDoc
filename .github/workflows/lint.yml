name: MandelDoc Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'tools/**'
      - 'specs/**'
      - 'templates/**'
      - '.github/workflows/**'
      - '.markdownlint-cli2.jsonc'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'tools/**'
      - '.github/workflows/**'
      - '.markdownlint-cli2.jsonc'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19

  beacon-validation:
    name: Beacon Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate beacons across the repository (templates, examples, dogfooded files)
        run: ./tools/validate-beacons.sh . --strict

  template-check:
    name: Template Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify templates exist
        run: |
          files=(
            "bootloader/MANDELDOC.md.template"
            "templates/MEMORY.md.template"
            "templates/SIGNAL_REGISTRY.md.template"
            "templates/HANDSHAKES.md.template"
            "templates/missions/_template.md"
            "templates/handshakes/_template.md"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=$((missing + 1))
            else
              echo "OK: $f"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "ERROR: $missing template(s) missing"
            exit 1
          fi
          echo "All templates present."

      - name: Verify specs exist
        run: |
          files=(
            "specs/SBS-v1.0.md"
            "specs/PSS-v1.0.md"
            "specs/CPA-v1.0.md"
            "specs/CLASSIFICATION.md"
            "specs/PHS-v1.0.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All specs present."

      - name: Verify tooling is executable
        run: |
          for f in tools/*.sh; do
            if [ ! -x "$f" ]; then
              echo "NOT EXECUTABLE: $f"
              exit 1
            fi
          done
          echo "All tools executable."
